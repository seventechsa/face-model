# Fast sanity-check config (small images, few epochs) to verify the pipeline
# on real data before committing to the long 456 run.
run_name: utkface_debug
seed: 42

data_root: ./data/UTKFace
output_root: ./outputs
image_size: 128

age_bins: [0, 20, 30, 40, 50, 200]

num_workers: 2
val_fraction: 0.05
test_fraction: 0.05

g_conv_dim: 64
g_res_blocks: 6
g_downsample: 2
d_conv_dim: 64
d_layers: 5

epochs: 3
batch_size: 8
g_lr: 0.0001
d_lr: 0.0001
beta1: 0.5
beta2: 0.999
n_critic: 1
adv_loss: hinge
lambda_cls: 1.0
lambda_rec: 10.0
lambda_id: 1.0
r1_gamma: 0.0
use_amp: true

use_identity: true
align_faces: false

sample_every_epochs: 1
save_every_epochs: 1
eval_every_epochs: 1
log_every_iters: 20
max_eval_images: 128
keep_last_n_epochs: -1
